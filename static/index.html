<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DevAI — AI Skills for Software Developers</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--bg2:#fff;--bg3:#f0f0ee;--border:#e4e4e2;
  --text:#111;--muted:#6b7280;--accent:#7C3AED;--accent2:#9f67ff;
  --green:#059669;--red:#dc2626;--yellow:#d97706;
  --radius:10px;--font:'Inter',system-ui,sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#f5f3ff,#ede9fe 40%,#f7f7f5)}
.auth-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
@media(max-width:480px){.auth-card{padding:24px 18px;border-radius:12px}.auth-wrap{align-items:flex-start;padding-top:40px}}
.auth-logo{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#7C3AED,#9f67ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-tagline{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.auth-label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:16px;margin-bottom:14px;transition:border .15s;-webkit-appearance:none;appearance:none}
.auth-input:focus{border-color:var(--accent);background:#fff;outline:none}
.auth-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border-radius:8px;font-size:16px;font-weight:700;margin-top:4px;transition:opacity .2s;-webkit-appearance:none;cursor:pointer;touch-action:manipulation}
.auth-btn:hover{opacity:.9}
.auth-btn:active{opacity:.8}
.auth-err{font-size:12px;color:var(--red);background:#fef2f2;border:1px solid #fecaca;padding:8px 10px;border-radius:6px;margin-bottom:12px}
.auth-switch{font-size:13px;color:var(--muted);text-align:center;margin-top:16px}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:600}

/* SHELL */
.shell{display:flex;min-height:100vh}
.sidebar{width:240px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border)}
.s-logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,#7C3AED,#9f67ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s-user{display:flex;align-items:center;gap:8px;margin-top:10px}
.s-avatar{width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.s-uname{font-size:12px;font-weight:600;flex:1}
.s-plan{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700}
.plan-free{background:#f3f4f6;color:#6b7280}
.plan-pro{background:#f5f3ff;color:#7C3AED}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px}
.nav-section{font-size:10px;font-weight:700;color:#9ca3af;padding:8px 6px 5px;text-transform:uppercase;letter-spacing:.07em}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;margin-bottom:1px;font-size:12px;font-weight:500;color:var(--muted);transition:all .12s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:#f5f3ff;color:var(--accent);font-weight:600}
.ni-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.ni-label{flex:1}
.ni-ct{font-size:10px;color:#9ca3af}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.upgrade-box{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1px solid #ddd6fe;border-radius:9px;padding:12px;margin-bottom:10px}
.ub-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:3px}
.ub-desc{font-size:11px;color:#7c6bad;margin-bottom:8px;line-height:1.4}
.ub-price{font-size:16px;font-weight:800;color:var(--accent);margin-bottom:8px}
.ub-price span{font-size:11px;font-weight:400;color:#9ca3af}
.ub-demo{font-size:10px;color:#9ca3af;margin-bottom:7px;line-height:1.4}
.ub-btn{width:100%;padding:9px;background:var(--accent);color:#fff;border-radius:7px;font-size:12px;font-weight:700;transition:opacity .2s}
.ub-btn:hover{opacity:.9}
.logout-btn{width:100%;padding:7px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;font-size:11px;transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
@media(max-width:860px){.main{overflow:auto}}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:#fff;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;flex:1}
.tb-sub{font-size:11px;color:var(--muted)}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);padding:6px 10px;border-radius:6px;transition:all .12s}
.back-btn:hover{background:var(--bg3);color:var(--text)}
.main-scroll{flex:1;overflow-y:auto;padding:20px}

/* DASHBOARD */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sc-val{font-size:26px;font-weight:800;margin-bottom:2px}
.sc-label{font-size:11px;color:var(--muted)}
.tracks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.track-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .18s;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.track-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 5px 16px rgba(124,58,237,.1)}
.tc-icon{font-size:24px;margin-bottom:8px}
.tc-title{font-size:14px;font-weight:700;margin-bottom:3px}
.tc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.tc-meta{display:flex;align-items:center;justify-content:space-between}
.tc-count{font-size:11px;color:var(--muted)}
.tc-bar{height:2px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.tc-fill{height:100%;border-radius:2px}
.tc-lock{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:#f3f4f6;color:var(--muted)}

/* TRACK */
.track-hdr{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.th-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.th-icon{font-size:32px}
.th-title{font-size:20px;font-weight:800}
.th-desc{font-size:13px;color:var(--muted)}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-row{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .12s;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.task-row:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(124,58,237,.08)}
.task-row.locked{opacity:.5;cursor:not-allowed}
.task-row.passed{border-color:var(--green);background:#f0fdf4}
.tr-num{font-size:11px;color:var(--muted);font-weight:700;width:22px;flex-shrink:0}
.tr-info{flex:1;min-width:0}
.tr-title{font-size:13px;font-weight:700;margin-bottom:2px}
.tr-desc{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.diff-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0}
.diff-beginner{background:#f0fdf4;color:#059669}
.diff-intermediate{background:#fffbeb;color:#d97706}
.diff-advanced{background:#f5f3ff;color:#7C3AED}
.tr-pass{color:#059669;font-size:16px;flex-shrink:0}
.tr-lock{font-size:14px;flex-shrink:0}
.tr-score{font-size:12px;font-weight:700;flex-shrink:0}

/* ── WORKSPACE — 3 column ── */
.workspace{display:grid;grid-template-columns:320px 1fr 200px;gap:0;height:calc(100vh - 53px);overflow:hidden}
@media(max-width:860px){.workspace{height:auto!important;overflow:visible!important}}
/* LEFT — agent instructions */
.agent-panel{background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ap-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg3);flex-shrink:0}
.ap-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.ap-title{font-size:14px;font-weight:800;margin-bottom:3px;line-height:1.3}
.ap-diff{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block}
.ap-scroll{flex:1;overflow-y:auto;padding:14px}
.ap-section{margin-bottom:16px}
.ap-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.ap-desc{font-size:13px;color:var(--text);line-height:1.6}
.ap-instruction{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:7px;padding:11px;font-size:12px;color:#6d28d9;line-height:1.5}
.ap-criteria{background:var(--bg3);border-radius:7px;padding:11px;font-size:12px;color:var(--text);line-height:1.5;border:1px solid var(--border)}
/* Agent result panels */
.eval-panel{margin-top:2px}
.score-big{text-align:center;padding:14px 0 10px}
.score-num{font-size:48px;font-weight:900;line-height:1}
.score-grade{font-size:13px;font-weight:700;margin-top:3px}
.score-bar{height:5px;background:var(--bg3);border-radius:5px;margin:10px 0;overflow:hidden}
.score-fill{height:100%;border-radius:5px;transition:width 1s}
.eval-verdict{background:var(--bg3);border-radius:7px;padding:10px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--border);margin-bottom:10px}
.eval-boxes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.eval-box{background:var(--bg3);border-radius:7px;padding:10px;border:1px solid var(--border)}
.eb-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px;letter-spacing:.05em}
.eb-text{font-size:11px;line-height:1.5;color:var(--text)}
.coach-panel{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px;margin-bottom:10px}
.coach-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:#d97706;margin-bottom:5px;letter-spacing:.05em}
.coach-text{font-size:12px;line-height:1.5;color:#78350f}
.path-panel{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px}
.path-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green);margin-bottom:5px;letter-spacing:.05em}
.path-text{font-size:12px;line-height:1.5;color:#064e3b;margin-bottom:8px}
.next-btn{width:100%;padding:9px;background:var(--green);color:#fff;border-radius:7px;font-size:12px;font-weight:700;transition:opacity .2s}
.next-btn:hover{opacity:.9}
.agent-tag{font-size:9px;color:#9ca3af;text-align:right;margin-top:6px}

/* CENTER — workspace */
.work-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.wp-top{padding:12px 16px;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0;display:flex;align-items:center;gap:10px}
.wp-top-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);flex:1}
.wp-chars{font-size:11px;color:var(--muted)}
.submit-btn{padding:11px 22px;background:var(--accent);color:#fff;border-radius:7px;font-size:13px;font-weight:700;transition:all .18s;display:flex;align-items:center;gap:7px;flex-shrink:0;touch-action:manipulation;-webkit-appearance:none}
.submit-btn:hover:not(:disabled){background:var(--accent2)}
.submit-btn:active:not(:disabled){opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.wp-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.prompt-textarea{width:100%;min-height:220px;background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:14px;font-size:16px;color:var(--text);resize:vertical;line-height:1.7;transition:border .15s;-webkit-appearance:none;touch-action:manipulation}
.prompt-textarea:focus{border-color:var(--accent);background:#fff;outline:none}
.prompt-textarea::placeholder{color:#9ca3af}
@media(max-width:640px){.prompt-textarea{min-height:200px;font-size:16px}}
.output-card{background:#fff;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.oc-header{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.oc-body{padding:14px;font-family:monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--text);max-height:280px;overflow-y:auto}
.oc-empty{padding:20px;text-align:center;font-size:12px;color:var(--muted);line-height:1.6}
/* example card */
.example-card{background:#fff;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ec-header{padding:10px 14px;border-bottom:1px solid var(--border);background:#fffbeb;font-size:11px;font-weight:700;text-transform:uppercase;color:#d97706;letter-spacing:.06em}
.ec-body{padding:14px;font-family:monospace;font-size:12px;line-height:1.7;color:var(--muted);white-space:pre-wrap;max-height:180px;overflow-y:auto}

/* RIGHT — blocks panel */
.blocks-panel{background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.bp-header{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);flex-shrink:0}
.bp-sub{font-size:9px;color:#9ca3af;margin-top:2px}
.bp-scroll{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.block-chip{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:11px;font-weight:600;color:var(--text);cursor:grab;transition:all .15s;user-select:none}
.block-chip:hover{background:#f5f3ff;border-color:#ddd6fe;color:var(--accent);transform:translateX(-2px)}
.block-chip:active{cursor:grabbing;transform:scale(0.97)}
.bp-hint{padding:10px;font-size:10px;color:#9ca3af;line-height:1.5;border-top:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.modal-hdr{padding:22px 22px 0;text-align:center}
.modal-title{font-size:20px;font-weight:800;margin-bottom:5px}
.modal-sub{font-size:13px;color:var(--muted)}
.modal-body{padding:22px}
.price-row{text-align:center;padding:18px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px}
.price-big{font-size:38px;font-weight:900;background:linear-gradient(135deg,#7C3AED,#9f67ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.price-per{font-size:13px;color:var(--muted)}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.feat-list li{display:flex;align-items:center;gap:7px;font-size:13px}
.feat-check{color:var(--green);font-size:14px}
.demo-box{background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:10px;margin-bottom:14px;text-align:center}
.demo-box-title{font-size:12px;font-weight:700;color:#d97706;margin-bottom:3px}
.demo-box-text{font-size:11px;color:#92400e;line-height:1.4}
.pay-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border-radius:9px;font-size:14px;font-weight:800;margin-bottom:9px;transition:opacity .2s}
.pay-btn:hover{opacity:.9}
.cancel-btn{width:100%;padding:9px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;font-size:12px}
.success-modal{text-align:center;padding:30px}
.sm-icon{font-size:48px;margin-bottom:10px}
.sm-title{font-size:20px;font-weight:800;margin-bottom:5px}
.sm-text{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.sm-btn{padding:11px 28px;background:var(--accent);color:#fff;border-radius:7px;font-size:13px;font-weight:700}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.mobile-menu{display:none}

@media(max-width:1100px){.workspace{grid-template-columns:280px 1fr 160px}}
@media(max-width:860px){
  .workspace{grid-template-columns:1fr;grid-template-rows:auto;height:auto;overflow:visible}
  .agent-panel{max-height:300px;overflow-y:auto}
  .work-panel{height:auto;overflow:visible}
  .wp-body{height:auto;overflow:visible}
  .prompt-textarea{min-height:180px}
  .blocks-panel{display:none}
}
@media(max-width:640px){
  .sidebar{position:fixed;left:-240px;top:0;bottom:0;z-index:50;transition:left .22s;box-shadow:3px 0 16px rgba(0,0,0,.1)}
  .sidebar.open{left:0}
  .mobile-menu{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--bg3);border-radius:7px;font-size:17px;cursor:pointer;border:1px solid var(--border);flex-shrink:0}
  .tracks-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
}
@media(min-width:641px){.mobile-menu{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API = '';

// ── Session persistence ───────────────────────────────────────────────────
function saveSession(user) {
  try { localStorage.setItem('devai_user', JSON.stringify(user)); } catch(e) {}
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem('devai_user')); } catch(e) { return null; }
}
function clearSession() {
  try { localStorage.removeItem('devai_user'); } catch(e) {}
}

let S = {
  view:'login', user:null, tracks:[], progress:{},
  currentTrack:null, currentTask:null, trackTasks:[],
  prompt:'', aiOutput:'', evalResult:null, coachHint:null, pathResult:null,
  loading:false, submitting:false, authErr:'',
  loginForm:{u:'',p:''}, signupForm:{u:'',e:'',p:''},
  showUpgradeModal:false, upgradeSuccess:false, sidebarOpen:false, mobileTab:'write',
};
function ss(p){S=Object.assign({},S,p);render();}

async function apiFetch(path,body,method='POST'){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  const data=await res.json();
  if(!res.ok)throw new Error(data.detail||'Request failed');
  return data;
}
async function apiGet(path){
  const res=await fetch(API+path);
  const data=await res.json();
  if(!res.ok)throw new Error(data.detail||'Failed');
  return data;
}
async function loadProgress(u){
  try{const d=await apiGet(`/api/progress/${u}`);const m={};d.progress.forEach(p=>{m[`${p.track_id}_${p.task_id}`]=p;});ss({progress:m});}catch(e){}
}
async function loadTracks(){
  try{const d=await apiGet('/api/tracks');ss({tracks:d.tracks});}catch(e){}
}
async function loadTrackTasks(tid){
  try{const d=await apiGet(`/api/tracks/${tid}/tasks?username=${S.user?.username}`);ss({trackTasks:d.tasks});}catch(e){}
}
async function doLogin(){
  ss({loading:true,authErr:''});
  try{
    const u=await apiFetch('/api/login',{username:S.loginForm.u,password:S.loginForm.p});
    await loadTracks();await loadProgress(u.username);
    saveSession(u);
    saveSession(u);
    ss({user:u,view:'dashboard',loading:false});
  }catch(e){ss({authErr:e.message,loading:false});}
}
async function doSignup(){
  if(!S.signupForm.u||!S.signupForm.e||!S.signupForm.p){ss({authErr:'All fields required'});return;}
  ss({loading:true,authErr:''});

function insertBlock(label){
  const ta=document.querySelector('.prompt-textarea');
  if(!ta)return;
  const pos=ta.selectionStart;
  const before=S.prompt.slice(0,pos);
  const after=S.prompt.slice(pos);
  S.prompt=before+'['+label+']'+after;
  ss({prompt:S.prompt});
  setTimeout(()=>{ta.focus();ta.selectionStart=ta.selectionEnd=pos+label.length+2;},10);
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){
    if(c==null||c===false)continue;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  }
  return el;
}
function sc(s){return s>=80?'#059669':s>=60?'#d97706':'#dc2626';}
function tProg(tid,tasks){
  const d=tasks?tasks.filter(t=>S.progress[`${tid}_${t.id}`]?.passed).length:0;
  const t=tasks?tasks.length:0;
  return{done:d,total:t,pct:t?Math.round(d/t*100):0};
}

  shell.appendChild(overlay);
  const main=h('div',{className:'main'});

    h('button',{className:'mobile-menu',onClick:()=>ss({sidebarOpen:!S.sidebarOpen})},'☰'),
    h('div',{style:{flex:'1'}},

    main.appendChild(renderTask());

    const scroll=h('div',{className:'main-scroll'});
    if(S.view==='dashboard')scroll.appendChild(renderDashboard());

  shell.appendChild(main);
  root.appendChild(shell);
  const modal=renderModal();if(modal)root.appendChild(modal);
}
window.addEventListener('resize',()=>{
  if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'))return;

});
